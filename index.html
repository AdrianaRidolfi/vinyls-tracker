<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vinyl Registry - Secure</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #121212; color: #eee; }
        .card { max-width: 400px; margin: auto; background: #1e1e1e; padding: 20px; border-radius: 12px; }
        input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 6px; border: 1px solid #333; background: #252525; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 14px; background: #007bff; color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; }
        .status { margin-top: 15px; font-size: 0.9em; text-align: center; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Aggiungi Vinile</h2>
        <input type="password" id="gh_token" placeholder="GitHub PAT (inserisci una volta)">
        <input type="text" id="artist" placeholder="Artista">
        <input type="text" id="title" placeholder="Titolo">
        <input type="url" id="url_1" placeholder="URL Amazon">
        <input type="url" id="url_2" placeholder="URL Altro">
        <button onclick="triggerDispatch()">Invia a GitHub Actions</button>
        <div id="status" class="status"></div>
    </div>

    <script>
        // Carica il token se salvato precedentemente
        document.getElementById('gh_token').value = localStorage.getItem('gh_pat') || '';

        async function triggerDispatch() {
            const token = document.getElementById('gh_token').value;
            const status = document.getElementById('status');
            
            localStorage.setItem('gh_pat', token); // Salva per la prossima volta

            const payload = {
                event_type: 'add_vinyl',
                client_payload: {
                    artist: document.getElementById('artist').value,
                    title: document.getElementById('title').value,
                    urls: [document.getElementById('url_1').value, document.getElementById('url_2').value].filter(u => u)
                }
            };

            status.innerText = 'Invio comando...';

            const response = await fetch('https://api.github.com/repos/TUO_USERNAME/TUO_REPO/dispatches', {
                method: 'POST',
                headers: {
                    'Authorization': `Bearer ${token}`,
                    'Accept': 'application/vnd.github.v3+json'
                },
                body: JSON.stringify(payload)
            });

            if (response.ok) {
                status.style.color = '#28a745';
                status.innerText = 'Comando ricevuto! GitHub Action partita.';
            } else {
                status.style.color = '#dc3545';
                status.innerText = 'Errore: controlla il Token o il nome repo.';
            }
        }
    </script>
</body>
</html>
