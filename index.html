<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vinyl Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; background: #121212; color: #eee; margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: auto; background: #1e1e1e; padding: 20px; border-radius: 8px; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; padding-bottom: 10px; margin-bottom: 20px; }
        h2 { margin: 0; color: #007bff; }
        .btn-add { background: #28a745; color: white; text-decoration: none; padding: 10px 15px; border-radius: 4px; font-weight: bold; font-size: 0.9em; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #333; }
        th { color: #888; font-size: 0.9em; }
        .price { font-weight: bold; color: #28a745; }
        .btn-action { padding: 6px 10px; margin-right: 5px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 0.8em; }
        .btn-details { background: #007bff; color: white; }
        .btn-delete { background: #dc3545; color: white; }
        #loading { text-align: center; color: #888; padding: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h2>I Miei Vinili</h2>
            <a href="add.html" class="btn-add">+ Nuovo Vinile</a>
        </div>
        
        <div id="loading">Caricamento dati in corso...</div>
        
        <table id="vinyl-table" style="display: none;">
            <thead>
                <tr>
                    <th>Artista</th>
                    <th>Titolo</th>
                    <th>Prezzo Minimo</th>
                    <th>Azioni</th>
                </tr>
            </thead>
            <tbody id="vinyl-list">
                </tbody>
        </table>
    </div>

 <script>
        // Initialize Supabase client
        const supabaseUrl = 'https://qwziokqukzaxjuyfoxsj.supabase.co';
        const supabaseKey = 'sb_publishable_6cs4sG_e6QJidMI69jyJkA_7pHag3pd';
        
        // Rinominato in supabaseClient per evitare conflitti con la libreria
        const supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);

        function formatEur(price) {
            if (price === null || price === undefined) return "N/D";
            return price.toFixed(2).replace('.', ',') + " €";
        }

        async function loadVinyls() {
            // Aggiornato il richiamo a supabaseClient
            const { data: vinyls, error } = await supabaseClient
                .from('vinyls')
                .select('*, sources(*)');

            const loadingObj = document.getElementById('loading');
            const tableObj = document.getElementById('vinyl-table');
            const listObj = document.getElementById('vinyl-list');

            if (error) {
                loadingObj.innerText = "Errore nel caricamento dei dati.";
                loadingObj.style.color = "#dc3545";
                console.error(error);
                return;
            }

            if (vinyls.length === 0) {
                loadingObj.innerText = "Nessun vinile in monitoraggio.";
                return;
            }

            loadingObj.style.display = 'none';
            tableObj.style.display = 'table';

            vinyls.forEach(vinyl => {
                let lowestPrice = null;
                let bestUrl = "#";

                if (vinyl.sources && vinyl.sources.length > 0) {
                    const validSources = vinyl.sources.filter(s => s.current_price !== null);
                    if (validSources.length > 0) {
                        const bestSource = validSources.reduce((min, s) => s.current_price < min.current_price ? s : min, validSources[0]);
                        lowestPrice = bestSource.current_price;
                        bestUrl = bestSource.url;
                    }
                }

                const tr = document.createElement('tr');
                
                tr.innerHTML = `
                    <td>${vinyl.artist}</td>
                    <td>${vinyl.title}</td>
                    <td>
                        <a href="${bestUrl}" target="_blank" class="price" style="text-decoration: none;">
                            ${formatEur(lowestPrice)}
                        </a>
                    </td>
                    <td>
                        <button class="btn-action btn-details" onclick="viewDetails(${vinyl.id})">Dettagli</button>
                        <button class="btn-action btn-delete" onclick="deleteVinyl(${vinyl.id})">Elimina</button>
                    </td>
                `;
                
                listObj.appendChild(tr);
            });
        }

        function viewDetails(id) {
            alert("Funzione dettagli in arrivo per il vinile ID: " + id);
        }

        async function deleteVinyl(id) {
            const token = localStorage.getItem('gh_pat');
            if (!token) {
                alert("GitHub PAT non trovato. Inseriscilo prima in 'Nuovo Vinile'.");
                return;
            }

            if (!confirm("Sei sicura di voler eliminare questo vinile?")) return;

            const payload = {
                event_type: 'delete_vinyl',
                client_payload: { id: id }
            };

            try {
                const response = await fetch('https://api.github.com/repos/adrianaridolfi/vinyls-tracker/dispatches', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Accept': 'application/vnd.github.v3+json'
                    },
                    body: JSON.stringify(payload)
                });

                if (response.ok) {
                    alert("Comando di eliminazione inviato. Potrebbe volerci qualche secondo prima che scompaia.");
                    location.reload(); 
                } else {
                    alert("Errore di invio. Verifica il PAT e i permessi.");
                }
            } catch (error) {
                alert("Errore di rete.");
            }
        }

        // Run on page load
        loadVinyls();
    </script>
</body>
</html>
