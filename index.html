<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vinyl Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* CSS Variables for Theme Support */
        :root {
            --bg-color: #121212;
            --container-bg: #1e1e1e;
            --text-color: #eee;
            --border-color: #333;
            --input-bg: #252525;
            --muted-text: #888;
            --highlight-bg: #2a3b2c;
            --highlight-border: #28a745;
            --link-color: #4da3ff;
            --modal-bg: #1e1e1e;
            --modal-overlay: rgba(0,0,0,0.8);
        }

        body.light-mode {
            --bg-color: #f4f4f9;
            --container-bg: #ffffff;
            --text-color: #222;
            --border-color: #ddd;
            --input-bg: #f9f9f9;
            --muted-text: #666;
            --highlight-bg: #e8f5e9;
            --highlight-border: #4caf50;
            --link-color: #0056b3;
            --modal-bg: #ffffff;
            --modal-overlay: rgba(0,0,0,0.5);
        }

        body { font-family: sans-serif; background: var(--bg-color); color: var(--text-color); margin: 0; padding: 20px; transition: background 0.3s, color 0.3s; }
        .container { max-width: 900px; margin: auto; background: var(--container-bg); padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-color); padding-bottom: 15px; margin-bottom: 20px; flex-wrap: wrap; gap: 10px; }
        h2 { margin: 0; color: #007bff; }
        
        .header-actions { display: flex; gap: 10px; }
        
        .auth-section { background: var(--input-bg); padding: 15px; border-radius: 6px; margin-bottom: 20px; display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
        .auth-section input { flex-grow: 1; padding: 10px; border-radius: 4px; border: 1px solid var(--border-color); background: var(--bg-color); color: var(--text-color); min-width: 200px; }
        .auth-section button { padding: 10px 15px; background: #555; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; transition: all 0.2s; }
        .auth-section button:hover { background: #666; }
        .auth-section button:active { transform: scale(0.95); }

        .btn-add { background: #28a745; color: white; text-decoration: none; padding: 10px 15px; border-radius: 4px; font-weight: bold; font-size: 0.9em; transition: all 0.2s; display: inline-block; }
        .btn-add:hover { background: #218838; }
        .btn-add:active { transform: scale(0.95); }
        
        .btn-theme { background: transparent; color: var(--text-color); border: 1px solid var(--border-color); padding: 10px; border-radius: 4px; cursor: pointer; font-weight: bold; transition: all 0.2s; }
        .btn-theme:hover { background: var(--border-color); }
        .btn-theme:active { transform: scale(0.95); }

        .table-responsive { overflow-x: auto; width: 100%; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; min-width: 600px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid var(--border-color); }
        th { color: var(--muted-text); font-size: 0.9em; }
        
        .sortable { cursor: pointer; user-select: none; }
        .sortable:hover { color: var(--text-color); }
        .sort-icon { font-size: 0.8em; margin-left: 5px; color: var(--muted-text); }

        .price { font-weight: bold; color: #28a745; }
        .cover-img { width: 50px; height: 50px; object-fit: cover; border-radius: 4px; }
        
        .btn-action { padding: 8px 12px; margin: 2px 5px 2px 0; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 0.8em; transition: all 0.2s; }
        .btn-action:hover { filter: brightness(1.1); }
        .btn-action:active { transform: scale(0.95); }
        
        .btn-details { background: #007bff; color: white; }
        .btn-delete { background: #dc3545; color: white; }
        .btn-secondary { background: #555; color: white; }
        .btn-warning { background: #ffc107; color: black; }
        .btn-success { background: #28a745; color: white; }
        
        .inactive-row { opacity: 0.4; }
        
        #loading { text-align: center; color: var(--muted-text); padding: 20px; }

        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background-color: var(--modal-overlay); }
        .modal-content { background-color: var(--modal-bg); margin: 10% auto; padding: 20px; border: 1px solid var(--border-color); width: 80%; border-radius: 8px; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        .modal-content.large { max-width: 600px; }
        .modal-content.small { max-width: 400px; text-align: center; }
        .close { color: var(--muted-text); float: right; font-size: 28px; font-weight: bold; cursor: pointer; transition: color 0.2s; }
        .close:hover { color: var(--text-color); }
        
        .history-section { margin-bottom: 15px; padding: 10px; background: var(--input-bg); border-radius: 4px; border-left: 3px solid transparent; }
        .history-section.best-price { background: var(--highlight-bg); border-left-color: var(--highlight-border); }
        .history-section h3 { margin-top: 0; font-size: 1.1em; }
        .history-section h3 a { color: var(--link-color); text-decoration: underline; }
        .history-section h3 a:hover { text-decoration: none; }
        
        .history-list { list-style-type: none; padding: 0; margin: 0; }
        .history-list li { padding: 5px 0; border-bottom: 1px dashed var(--border-color); font-size: 0.9em; display: flex; justify-content: space-between; }
        .history-list li:last-child { border-bottom: none; }
        
        .modal-buttons { margin-top: 20px; display: flex; justify-content: center; gap: 10px; }

        @media (max-width: 600px) {
            .header { flex-direction: column; align-items: flex-start; }
            .auth-section { flex-direction: column; align-items: stretch; }
            .auth-section button { width: 100%; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h2>I Miei Vinili</h2>
            <div class="header-actions">
                <button class="btn-theme" onclick="toggleTheme()" id="theme-toggle-btn">Modalità Chiara</button>
                <a href="add.html" class="btn-add">+ Nuovo Vinile</a>
            </div>
        </div>

        <div class="auth-section">
            <input type="password" id="gh_token" placeholder="Inserisci il tuo GitHub Personal Access Token">
            <button onclick="saveToken()">Salva Token</button>
        </div>
        
        <div id="loading">Caricamento catalogo...</div>
        
        <div class="table-responsive">
            <table id="vinyl-table" style="display: none;">
                <thead>
                    <tr>
                        <th>Cover</th>
                        <th class="sortable" onclick="handleSort('title')">Artista & Titolo <span id="sort-icon-title" class="sort-icon"></span></th>
                        <th class="sortable" onclick="handleSort('price')">Miglior Prezzo <span id="sort-icon-price" class="sort-icon"></span></th>
                        <th>Azioni</th>
                    </tr>
                </thead>
                <tbody id="vinyl-list">
                </tbody>
            </table>
        </div>
    </div>

    <div id="details-modal" class="modal">
        <div class="modal-content large">
            <span class="close" onclick="closeModal('details-modal')">&times;</span>
            <h2 id="modal-title" style="margin-bottom: 20px; color: var(--text-color);">Dettagli Prezzo</h2>
            <div id="modal-body">
                Caricamento storico...
            </div>
        </div>
    </div>

    <div id="alert-modal" class="modal">
        <div class="modal-content small">
            <h3 id="alert-title" style="margin-top:0; color: var(--text-color);">Avviso</h3>
            <p id="alert-message"></p>
            <div class="modal-buttons">
                <button class="btn-action btn-details" onclick="closeModal('alert-modal')" style="padding: 10px 20px;">OK</button>
            </div>
        </div>
    </div>

    <div id="confirm-modal" class="modal">
        <div class="modal-content small">
            <h3 style="margin-top:0; color: #dc3545;">Attenzione</h3>
            <p id="confirm-message"></p>
            <div class="modal-buttons">
                <button class="btn-action btn-secondary" onclick="closeModal('confirm-modal')" style="padding: 10px 20px;">Annulla</button>
                <button class="btn-action btn-delete" id="confirm-yes-btn" style="padding: 10px 20px;">Conferma</button>
            </div>
        </div>
    </div>

    <script>
        const supabaseUrl = 'https://qwziokqukzaxjuyfoxsj.supabase.co';
        const supabaseKey = 'sb_publishable_6cs4sG_e6QJidMI69jyJkA_7pHag3pd';
        
        const supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey, {
            auth: { persistSession: false }
        });

        // Applica il tema salvato all'avvio
        if (localStorage.getItem('theme') === 'light') {
            document.body.classList.add('light-mode');
            document.getElementById('theme-toggle-btn').innerText = 'Modalità Scura';
        }
        
        document.getElementById('gh_token').value = localStorage.getItem('gh_pat') || '';

        // Variabili globali per ordinamento tabella
        let vinylDataCache = [];
        let currentSortColumn = 'id';
        let currentSortAsc = false;

        function toggleTheme() {
            const isLight = document.body.classList.toggle('light-mode');
            localStorage.setItem('theme', isLight ? 'light' : 'dark');
            document.getElementById('theme-toggle-btn').innerText = isLight ? 'Modalità Scura' : 'Modalità Chiara';
        }
        
        function customAlert(title, message) {
            document.getElementById('alert-title').innerText = title;
            document.getElementById('alert-message').innerText = message;
            document.getElementById('alert-modal').style.display = 'block';
        }

        function customConfirm(message, onConfirm) {
            document.getElementById('confirm-message').innerText = message;
            document.getElementById('confirm-modal').style.display = 'block';
            
            const yesBtn = document.getElementById('confirm-yes-btn');
            yesBtn.replaceWith(yesBtn.cloneNode(true));
            document.getElementById('confirm-yes-btn').addEventListener('click', function() {
                closeModal('confirm-modal');
                onConfirm();
            });
        }

        function closeModal(modalId) {
            document.getElementById(modalId).style.display = 'none';
        }

        window.onclick = function(event) {
            if (event.target.classList.contains('modal')) {
                event.target.style.display = "none";
            }
        }

        function saveToken() {
            const token = document.getElementById('gh_token').value;
            if (token) {
                localStorage.setItem('gh_pat', token);
                customAlert("Successo", "Token salvato nel browser.");
            }
        }

        function formatEur(price) {
            if (price === null || price === undefined) return "N/D";
            return price.toFixed(2).replace('.', ',') + " €";
        }

        function formatDate(isoString) {
            const date = new Date(isoString);
            return date.toLocaleDateString('it-IT') + " " + date.toLocaleTimeString('it-IT', {hour: '2-digit', minute:'2-digit'});
        }

        async function loadVinyls() {
            const { data: vinyls, error } = await supabaseClient
                .from('vinyls')
                .select('*, sources(*)');

            const loadingObj = document.getElementById('loading');
            const tableObj = document.getElementById('vinyl-table');

            if (error) {
                loadingObj.innerText = "Errore nel caricamento dei dati dal database.";
                loadingObj.style.color = "#dc3545";
                return;
            }

            if (vinyls.length === 0) {
                loadingObj.innerText = "Nessun vinile in monitoraggio.";
                return;
            }

            // Calcola in anticipo il prezzo minimo per ogni vinile per facilitare l'ordinamento
            vinyls.forEach(vinyl => {
                vinyl.lowestPrice = null;
                vinyl.bestUrl = "#";
                if (vinyl.sources && vinyl.sources.length > 0) {
                    const validSources = vinyl.sources.filter(s => s.current_price !== null);
                    if (validSources.length > 0) {
                        const bestSource = validSources.reduce((min, s) => s.current_price < min.current_price ? s : min, validSources[0]);
                        vinyl.lowestPrice = bestSource.current_price;
                        vinyl.bestUrl = bestSource.url;
                    }
                }
            });

            vinylDataCache = vinyls;
            
            loadingObj.style.display = 'none';
            tableObj.style.display = 'table';
            
            // Ordinamento default iniziale (nuovi inserimenti in alto)
            handleSort('id', false); 
        }

        function handleSort(column, overrideAsc = null) {
            document.getElementById('sort-icon-title').innerText = '';
            document.getElementById('sort-icon-price').innerText = '';

            if (column === currentSortColumn) {
                currentSortAsc = overrideAsc !== null ? overrideAsc : !currentSortAsc;
            } else {
                currentSortColumn = column;
                currentSortAsc = overrideAsc !== null ? overrideAsc : true;
            }

            // Aggiorna l'icona visiva
            const iconId = column === 'title' ? 'sort-icon-title' : (column === 'price' ? 'sort-icon-price' : null);
            if (iconId) {
                document.getElementById(iconId).innerText = currentSortAsc ? '▲' : '▼';
            }

            vinylDataCache.sort((a, b) => {
                let valA, valB;

                if (column === 'title') {
                    valA = (a.artist + " " + a.title).toLowerCase();
                    valB = (b.artist + " " + b.title).toLowerCase();
                } else if (column === 'price') {
                    // Mette i valori null (N/D) in fondo alla lista
                    valA = a.lowestPrice === null ? Infinity : a.lowestPrice;
                    valB = b.lowestPrice === null ? Infinity : b.lowestPrice;
                } else if (column === 'id') {
                    valA = a.id;
                    valB = b.id;
                }

                if (valA < valB) return currentSortAsc ? -1 : 1;
                if (valA > valB) return currentSortAsc ? 1 : -1;
                return 0;
            });

            renderTableData();
        }

        function renderTableData() {
            const listObj = document.getElementById('vinyl-list');
            listObj.innerHTML = '';

            vinylDataCache.forEach(vinyl => {
                const coverHtml = vinyl.cover_url 
                    ? `<img src="${vinyl.cover_url}" class="cover-img">` 
                    : `<div class="cover-img" style="background:var(--border-color); display:flex; align-items:center; justify-content:center; font-size:10px;">No IMG</div>`;

                const isCurrentlyActive = vinyl.is_active !== false;
                const rowClass = isCurrentlyActive ? "" : "inactive-row";
                const toggleClass = isCurrentlyActive ? "btn-warning" : "btn-success";
                const toggleText = isCurrentlyActive ? "Sospendi" : "Riprendi";

                const tr = document.createElement('tr');
                tr.className = rowClass;
                tr.innerHTML = `
                    <td>${coverHtml}</td>
                    <td><strong>${vinyl.artist}</strong><br><span style="color:var(--muted-text); font-size:0.9em;">${vinyl.title}</span></td>
                    <td>
                        <a href="${vinyl.bestUrl}" target="_blank" class="price" style="text-decoration: none;">
                            ${formatEur(vinyl.lowestPrice)}
                        </a>
                    </td>
                    <td>
                        <button class="btn-action btn-details" onclick="viewDetails(${vinyl.id}, '${vinyl.artist.replace(/'/g, "\\'")}', '${vinyl.title.replace(/'/g, "\\'")}')">Dettagli</button>
                        <button class="btn-action ${toggleClass}" onclick="requestToggle(${vinyl.id}, ${isCurrentlyActive})">${toggleText}</button>
                        <button class="btn-action btn-delete" onclick="requestDelete(${vinyl.id})">Elimina</button>
                    </td>
                `;
                listObj.appendChild(tr);
            });
        }

        async function viewDetails(vinylId, artist, title) {
            document.getElementById('modal-title').innerText = `${artist} - ${title}`;
            document.getElementById('modal-body').innerHTML = "Caricamento storico...";
            document.getElementById('details-modal').style.display = 'block';

            const { data: sources, error } = await supabaseClient
                .from('sources')
                .select('site_name, url, current_price, price_history(price, recorded_at)')
                .eq('vinyl_id', vinylId);

            if (error) {
                document.getElementById('modal-body').innerHTML = '<p style="color:#dc3545;">Errore di caricamento storico.</p>';
                return;
            }

            if (!sources || sources.length === 0) {
                document.getElementById('modal-body').innerHTML = '<p>Nessuna sorgente registrata.</p>';
                return;
            }

            // Ordina i siti dal più economico al più costoso
            sources.sort((a, b) => {
                if (a.current_price === null) return 1;
                if (b.current_price === null) return -1;
                return a.current_price - b.current_price;
            });

            let html = '';
            sources.forEach((source, index) => {
                // Aggiunge la classe best-price solo al primo elemento (se il prezzo non è nullo)
                const isBestPrice = index === 0 && source.current_price !== null ? 'best-price' : '';
                
                html += `
                    <div class="history-section ${isBestPrice}">
                        <h3><a href="${source.url}" target="_blank">${source.site_name}</a> - Attuale: <span class="price">${formatEur(source.current_price)}</span></h3>
                `;

                if (source.price_history && source.price_history.length > 0) {
                    source.price_history.sort((a, b) => new Date(b.recorded_at) - new Date(a.recorded_at));
                    
                    html += `<ul class="history-list">`;
                    source.price_history.slice(0, 5).forEach(ph => {
                        html += `<li><span>${formatDate(ph.recorded_at)}</span> <strong>${formatEur(ph.price)}</strong></li>`;
                    });
                    html += `</ul>`;
                } else {
                    html += `<p style="color:var(--muted-text); font-size:0.9em;">Nessun dato storico archiviato finora.</p>`;
                }
                html += `</div>`;
            });

            document.getElementById('modal-body').innerHTML = html;
        }

        function requestToggle(id, currentState) {
            const token = document.getElementById('gh_token').value;
            if (!token) {
                customAlert("Errore", "Salva prima il tuo PAT nel campo in alto.");
                return;
            }

            const newState = !currentState;
            const actionText = newState ? "riprendere" : "sospendere";

            customConfirm(`Vuoi ${actionText} il tracciamento per questo vinile?`, function() {
                executeDispatch('toggle_tracking', { id: id, is_active: newState }, token);
            });
        }

        function requestDelete(id) {
            const token = document.getElementById('gh_token').value;
            if (!token) {
                customAlert("Errore", "Salva prima il tuo PAT nel campo in alto.");
                return;
            }

            customConfirm("Eliminare definitivamente questo vinile e tutto il suo storico?", function() {
                executeDispatch('delete_vinyl', { id: id }, token);
            });
        }

        async function executeDispatch(eventType, payloadData, token) {
            const payload = {
                event_type: eventType,
                client_payload: payloadData
            };

            try {
                const response = await fetch('https://api.github.com/repos/adrianaridolfi/vinyls-tracker/dispatches', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Accept': 'application/vnd.github.v3+json'
                    },
                    body: JSON.stringify(payload)
                });

                if (response.ok) {
                    customAlert("Successo", "Comando inviato ad Actions. Aggiorna la pagina tra qualche secondo.");
                } else {
                    customAlert("Errore", "Controlla che il PAT sia corretto e non scaduto.");
                }
            } catch (error) {
                customAlert("Errore", "Errore di rete.");
            }
        }

        loadVinyls();
    </script>
</body>
</html>
