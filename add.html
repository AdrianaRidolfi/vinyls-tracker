<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vinyl Registry</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: #eee; margin: 0; padding: 20px; }
        .container { max-width: 400px; margin: auto; background: #1e1e1e; padding: 20px; border-radius: 8px; }
        h2 { margin-top: 0; color: #007bff; border-bottom: 1px solid #333; padding-bottom: 10px; }
        label { display: block; margin: 10px 0 5px; font-size: 0.8em; color: #888; }
        input { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 4px; border: 1px solid #333; background: #252525; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 14px; background: #007bff; color: white; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; }
        button:disabled { background: #444; cursor: not-allowed; }
        .status-msg { margin-top: 15px; text-align: center; font-size: 0.9em; min-height: 1.2em; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Nuovo Vinile</h2>
        
        <label>GitHub Personal Access Token</label>
        <input type="password" id="gh_token" placeholder="Inserisci il PAT">
        
        <label>Dettagli</label>
        <input type="text" id="artist" placeholder="Artista">
        <input type="text" id="title" placeholder="Titolo">
        
        <label>Link</label>
        <input type="url" id="url_amazon" placeholder="URL Amazon">
        <input type="url" id="url_feltrinelli" placeholder="URL Feltrinelli">
        <input type="url" id="url_other" placeholder="URL Alternativo">
        
        <button id="submitBtn" onclick="sendData()">Inserisci Vinile</button>
        <div id="status" class="status-msg"></div>
    </div>

    <script>
        document.getElementById('gh_token').value = localStorage.getItem('gh_pat') || '';

        async function sendData() {
            const btn = document.getElementById('submitBtn');
            const status = document.getElementById('status');
            const token = document.getElementById('gh_token').value;
            const artist = document.getElementById('artist').value;
            const title = document.getElementById('title').value;

            if (!token || !artist || !title) {
                status.innerText = "Errore: Compila PAT, Artista e Titolo.";
                status.style.color = "#dc3545";
                return;
            }

            localStorage.setItem('gh_pat', token);

            btn.disabled = true;
            status.innerText = "Invio in corso...";
            status.style.color = "#eee";

            const payload = {
                event_type: 'add_vinyl',
                client_payload: {
                    artist: artist,
                    title: title,
                    urls: [
                        { name: 'Amazon', url: document.getElementById('url_amazon').value },
                        { name: 'Feltrinelli', url: document.getElementById('url_feltrinelli').value },
                        { name: 'Altro', url: document.getElementById('url_other').value }
                    ].filter(u => u.url)
                }
            };

            try {
                const response = await fetch('https://api.github.com/repos/adrianaridolfi/vinyls-tracker/dispatches', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Accept': 'application/vnd.github.v3+json'
                    },
                    body: JSON.stringify(payload)
                });

                if (response.ok) {
                    status.innerText = "Vinile inviato con successo.";
                    status.style.color = "#28a745";
                    
                    document.getElementById('artist').value = '';
                    document.getElementById('title').value = '';
                    document.getElementById('url_amazon').value = '';
                    document.getElementById('url_feltrinelli').value = '';
                    document.getElementById('url_other').value = '';
                } else {
                    status.innerText = "Errore di invio. Verifica il PAT e i permessi.";
                    status.style.color = "#dc3545";
                }
            } catch (error) {
                status.innerText = "Errore di rete.";
                status.style.color = "#dc3545";
            } finally {
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
