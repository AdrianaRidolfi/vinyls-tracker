<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vinyl Registry</title>
    <style>
        /* CSS Variables for Theme Support (Coerenti con index.html) */
        :root {
            --bg-color: #121212;
            --container-bg: #1e1e1e;
            --text-color: #eee;
            --border-color: #333;
            --input-bg: #252525;
            --muted-text: #888;
        }

        body.light-mode {
            --bg-color: #f4f4f9;
            --container-bg: #ffffff;
            --text-color: #222;
            --border-color: #ddd;
            --input-bg: #f9f9f9;
            --muted-text: #666;
        }

        body { font-family: sans-serif; background: var(--bg-color); color: var(--text-color); margin: 0; padding: 20px; transition: background 0.3s, color 0.3s; }
        .container { max-width: 400px; margin: auto; background: var(--container-bg); padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-color); padding-bottom: 15px; margin-bottom: 20px; }
        h2 { margin: 0; color: #007bff; }
        
        .btn-theme { background: transparent; color: var(--text-color); border: 1px solid var(--border-color); padding: 8px 12px; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 0.8em; transition: all 0.2s; }
        .btn-theme:hover { background: var(--border-color); }
        .btn-theme:active { transform: scale(0.95); }

        label { display: block; margin: 10px 0 5px; font-size: 0.8em; color: var(--muted-text); }
        input { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 4px; border: 1px solid var(--border-color); background: var(--input-bg); color: var(--text-color); box-sizing: border-box; }
        
        button, .btn-link { width: 100%; padding: 14px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; box-sizing: border-box; transition: all 0.2s; }
        .btn-primary { background: #007bff; color: white; margin-bottom: 10px; }
        .btn-primary:hover { filter: brightness(1.1); }
        .btn-primary:active { transform: scale(0.98); }
        .btn-primary:disabled { background: var(--border-color); color: var(--muted-text); cursor: not-allowed; transform: none; filter: none; }
        
        .btn-link { background: #333; color: #eee; display: block; text-align: center; text-decoration: none; font-size: 0.9em; }
        .btn-link:hover { background: #444; }
        .btn-link:active { transform: scale(0.98); }
        
        .status-msg { margin-top: 15px; text-align: center; font-size: 0.9em; min-height: 1.2em; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h2>Nuovo Vinile</h2>
            <button class="btn-theme" onclick="toggleTheme()" id="theme-toggle-btn">Chiar</button>
        </div>
        
        <label>GitHub Personal Access Token</label>
        <input type="password" id="gh_token" placeholder="Inserisci il PAT">
        
        <label>Dettagli</label>
        <input type="text" id="artist" placeholder="Artista">
        <input type="text" id="title" placeholder="Titolo">
        
        <label>Link</label>
        <input type="url" id="url_amazon" placeholder="URL Amazon">
        <input type="url" id="url_feltrinelli" placeholder="URL Feltrinelli">
        <input type="url" id="url_other" placeholder="URL Alternativo">
        
        <button id="submitBtn" class="btn-primary" onclick="sendData()">Inserisci Vinile</button>
        <a href="index.html" class="btn-link">Torna alla Dashboard</a>
        
        <div id="status" class="status-msg"></div>
    </div>

    <script>
        // Gestione Tema (sincronizzata con index.html)
        if (localStorage.getItem('theme') === 'light') {
            document.body.classList.add('light-mode');
            document.getElementById('theme-toggle-btn').innerText = 'Scura';
        }
        
        function toggleTheme() {
            const isLight = document.body.classList.toggle('light-mode');
            localStorage.setItem('theme', isLight ? 'light' : 'dark');
            document.getElementById('theme-toggle-btn').innerText = isLight ? 'Scura' : 'Chiara';
        }

        document.getElementById('gh_token').value = localStorage.getItem('gh_pat') || '';

        async function sendData() {
            const btn = document.getElementById('submitBtn');
            const status = document.getElementById('status');
            const token = document.getElementById('gh_token').value;
            const artist = document.getElementById('artist').value;
            const title = document.getElementById('title').value;

            if (!token || !artist || !title) {
                status.innerText = "Errore: Compila PAT, Artista e Titolo.";
                status.style.color = "#dc3545";
                return;
            }

            localStorage.setItem('gh_pat', token);

            btn.disabled = true;
            status.innerText = "Invio in corso...";
            status.style.color = "var(--text-color)";

            const payload = {
                event_type: 'add_vinyl',
                client_payload: {
                    artist: artist,
                    title: title,
                    urls: [
                        { name: 'Amazon', url: document.getElementById('url_amazon').value },
                        { name: 'Feltrinelli', url: document.getElementById('url_feltrinelli').value },
                        { name: 'Altro', url: document.getElementById('url_other').value }
                    ].filter(u => u.url)
                }
            };

            try {
                const response = await fetch('https://api.github.com/repos/adrianaridolfi/vinyls-tracker/dispatches', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Accept': 'application/vnd.github.v3+json'
                    },
                    body: JSON.stringify(payload)
                });

                if (response.ok) {
                    status.innerText = "Vinile inviato con successo.";
                    status.style.color = "#28a745";
                    
                    document.getElementById('artist').value = '';
                    document.getElementById('title').value = '';
                    document.getElementById('url_amazon').value = '';
                    document.getElementById('url_feltrinelli').value = '';
                    document.getElementById('url_other').value = '';
                } else {
                    status.innerText = "Errore di invio. Verifica il PAT e i permessi.";
                    status.style.color = "#dc3545";
                }
            } catch (error) {
                status.innerText = "Errore di rete.";
                status.style.color = "#dc3545";
            } finally {
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
